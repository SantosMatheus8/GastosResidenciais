version: '3.9'

services:
  sqlserver-popa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sqlserver-popa
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./Backend/migrations:/migrations
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "sqlserver-popa", "-U", "sa", "-P", "YourStrong!Passw0rd", "-Q", "SELECT @@VERSION" ]
      interval: 10s
      retries: 10
      start_period: 10s

  migration-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: migration-runner
    depends_on:
      sqlserver-popa:
        condition: service_healthy
    volumes:
      - ./Backend/migrations:/migrations
    entrypoint: >
      /bin/bash -c "
        echo 'Aguardando o banco de dados estar totalmente pronto...';
        /usr/local/bin/wait-for-it.sh sqlserver-popa:1433 --timeout=300 --strict -- echo 'Banco de dados pronto!';

        echo 'Criando banco de dados ResiGaDb (se nao existir)...';
        /opt/mssql-tools/bin/sqlcmd -S sqlserver-popa -U sa -P 'YourStrong!Passw0rd' -Q \"IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'ResiGaDb') CREATE DATABASE ResiGaDb;\";

        # Find migration files and store them in an array
        migration_files=(/migrations/*.sql)

        # Check if the array is empty (no files found)
        if [ \"$${migration_files[0]}\" = \"/migrations/*.sql\" ]; then
            echo '⚠️ Nenhum arquivo de migration encontrado.';
        else
            echo 'Iniciando a execução das migrations...';
            for file in \"$${migration_files[@]}\"; do
                echo 'Executando migration: '$$file'';
                /opt/mssql-tools/bin/sqlcmd -S sqlserver-popa -U sa -P 'YourStrong!Passw0rd' -d ResiGaDb -i \"$$file\";
            done;
            echo '✅ Todas as migrations foram executadas';
        fi
        "

  popadin-api:
    build:
      context: ./Backend/src
      dockerfile: ResiGa.Bkd.Api/Dockerfile
    depends_on:
      sqlserver-popa:
        condition: service_healthy
    ports:
      - "5285:5285"
    environment:
      - ASPNETCORE_URLS=http://+:5285/
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - ConnectionStrings__Database=Server=sqlserver-popa,1433;Database=ResiGaDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
    restart: unless-stopped

volumes:
  sqlserver_data:
